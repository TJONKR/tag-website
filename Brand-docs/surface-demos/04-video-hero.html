<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAG - Video Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0e0d0b;
      color: #f0ebe3;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }

    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
    }

    .video-container video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    .gradient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background: linear-gradient(
        to bottom,
        rgba(14, 13, 11, 0.15) 0%,
        rgba(14, 13, 11, 0.3) 40%,
        rgba(14, 13, 11, 0.6) 70%,
        rgba(14, 13, 11, 0.85) 100%
      );
      pointer-events: none;
    }

    .grain-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      opacity: 0.04;
    }

    .content {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(80px, 10vw, 140px);
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: #f0ebe3;
      margin-bottom: 16px;
    }

    .hero-location {
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: 14px;
      color: #9b9589;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 80px;
    }

    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(42, 39, 36, 0.4);
      z-index: 5;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #ff5f1f;
      transition: none;
      box-shadow: 0 0 8px rgba(255, 95, 31, 0.4);
    }

    .play-button {
      position: fixed;
      bottom: 28px;
      right: 40px;
      z-index: 5;
      pointer-events: all;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    .play-button:hover {
      opacity: 1;
    }

    .play-icon {
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(240, 235, 227, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .play-icon .triangle {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 6px 0 6px 10px;
      border-color: transparent transparent transparent #f0ebe3;
      margin-left: 2px;
    }

    .play-icon .pause-bars {
      display: none;
      gap: 3px;
    }

    .play-icon .pause-bars span {
      width: 3px;
      height: 12px;
      background: #f0ebe3;
      border-radius: 1px;
    }

    .play-icon.playing .triangle { display: none; }
    .play-icon.playing .pause-bars { display: flex; }

    .play-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #9b9589;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .timecode {
      position: fixed;
      bottom: 30px;
      right: 140px;
      z-index: 5;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #5e5850;
      letter-spacing: 0.05em;
    }

    /* Mute toggle */
    .mute-button {
      position: fixed;
      bottom: 28px;
      left: 40px;
      z-index: 5;
      pointer-events: all;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    .mute-button:hover {
      opacity: 1;
    }

    .mute-icon {
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(240, 235, 227, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mute-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: #f0ebe3;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mute-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #9b9589;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video id="video" autoplay muted loop playsinline>
      <source src="tag-video.mp4" type="video/mp4">
    </video>
  </div>
  <div class="gradient-overlay"></div>
  <svg class="grain-overlay" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain)"/>
  </svg>
  <div class="content">
    <div class="hero-title">TAG</div>
    <div class="hero-location">Amsterdam</div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="timecode" id="timecode">00:00 / 00:00</div>
  <div class="play-button" id="play-button">
    <div class="play-icon playing" id="play-icon">
      <div class="triangle"></div>
      <div class="pause-bars"><span></span><span></span></div>
    </div>
    <div class="play-label" id="play-label">Now playing</div>
  </div>
  <div class="mute-button" id="mute-button">
    <div class="mute-icon">
      <svg viewBox="0 0 24 24">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <line x1="23" y1="9" x2="17" y2="15" id="mute-x1" style="display:none"/>
        <line x1="17" y1="9" x2="23" y2="15" id="mute-x2" style="display:none"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" id="vol-wave-1" style="display:none"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" id="vol-wave-2" style="display:none"/>
      </svg>
    </div>
    <div class="mute-label" id="mute-label">Unmute</div>
  </div>

  <script>
    const video = document.getElementById('video')
    const progressFill = document.getElementById('progress-fill')
    const timecodeEl = document.getElementById('timecode')
    const playButton = document.getElementById('play-button')
    const playIcon = document.getElementById('play-icon')
    const playLabel = document.getElementById('play-label')
    const muteButton = document.getElementById('mute-button')
    const muteLabel = document.getElementById('mute-label')

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60)
      const s = Math.floor(seconds % 60)
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`
    }

    // Progress + timecode
    function updateProgress() {
      if (video.duration) {
        const progress = (video.currentTime / video.duration) * 100
        progressFill.style.width = progress + '%'
        timecodeEl.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`
      }
      requestAnimationFrame(updateProgress)
    }
    requestAnimationFrame(updateProgress)

    // Play / Pause
    playButton.addEventListener('click', () => {
      if (video.paused) {
        video.play()
        playIcon.classList.add('playing')
        playLabel.textContent = 'Now playing'
      } else {
        video.pause()
        playIcon.classList.remove('playing')
        playLabel.textContent = 'Paused'
      }
    })

    // Mute / Unmute
    muteButton.addEventListener('click', () => {
      video.muted = !video.muted
      updateMuteUI()
    })

    function updateMuteUI() {
      const x1 = document.getElementById('mute-x1')
      const x2 = document.getElementById('mute-x2')
      const w1 = document.getElementById('vol-wave-1')
      const w2 = document.getElementById('vol-wave-2')

      if (video.muted) {
        muteLabel.textContent = 'Unmute'
        x1.style.display = 'block'
        x2.style.display = 'block'
        w1.style.display = 'none'
        w2.style.display = 'none'
      } else {
        muteLabel.textContent = 'Mute'
        x1.style.display = 'none'
        x2.style.display = 'none'
        w1.style.display = 'block'
        w2.style.display = 'block'
      }
    }

    // Init mute UI state
    updateMuteUI()
  </script>
</body>
</html>
