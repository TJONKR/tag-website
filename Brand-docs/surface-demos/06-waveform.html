<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAG - Waveform Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141210;
      color: #f0ebe3;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(60px, 8vw, 100px);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #f0ebe3;
      position: relative;
      /* Text mask effect - waves show through slightly */
    }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: 12px;
      color: #5e5850;
      letter-spacing: 0.15em;
      margin-top: 16px;
      text-transform: lowercase;
    }

    .freq-label {
      position: fixed;
      top: 36px;
      left: 40px;
      z-index: 10;
      pointer-events: none;
    }

    .freq-label .label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #3a3630;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .freq-label .value {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: #ff5f1f;
      margin-top: 4px;
      display: block;
    }

    .status {
      position: fixed;
      top: 36px;
      right: 40px;
      z-index: 10;
      pointer-events: none;
      text-align: right;
    }

    .status .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ff5f1f;
      margin-right: 8px;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .status .text {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #5e5850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bottom-bar {
      position: fixed;
      bottom: 36px;
      left: 40px;
      right: 40px;
      z-index: 10;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .bottom-bar .channel {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #3a3630;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bottom-bar .channel span {
      color: #5e5850;
    }

    .grain-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
      opacity: 0.03;
    }
  </style>
</head>
<body>
  <canvas id="wave-canvas"></canvas>

  <svg class="grain-overlay" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain)"/>
  </svg>

  <div class="content">
    <div class="title">TAG</div>
    <div class="subtitle">signal &middot; frequency &middot; energy</div>
  </div>

  <div class="freq-label">
    <span class="label">Frequency</span>
    <span class="value" id="freq-value">432 Hz</span>
  </div>

  <div class="status">
    <span class="dot"></span>
    <span class="text">Broadcasting</span>
  </div>

  <div class="bottom-bar">
    <div class="channel">CH-01 <span>// stereo</span></div>
    <div class="channel">-3.2 <span>dB</span></div>
    <div class="channel">48 <span>kHz</span> / 24 <span>bit</span></div>
  </div>

  <script>
    const canvas = document.getElementById('wave-canvas')
    const ctx = canvas.getContext('2d')
    const freqValueEl = document.getElementById('freq-value')

    let dpr = window.devicePixelRatio || 1
    let time = 0

    function resize() {
      dpr = window.devicePixelRatio || 1
      canvas.width = window.innerWidth * dpr
      canvas.height = window.innerHeight * dpr
      ctx.scale(dpr, dpr)
    }
    resize()
    window.addEventListener('resize', resize)

    // Wave definitions
    const waves = [
      {
        // Ghost wave - slowest, largest, background
        frequency: 0.003,
        amplitude: 80,
        speed: 0.008,
        phase: 0,
        color: { r: 42, g: 39, b: 36 },
        opacity: 0.4,
        lineWidth: 1,
        yOffset: 0
      },
      {
        // Main wave - prominent orange
        frequency: 0.006,
        amplitude: 50,
        speed: 0.015,
        phase: Math.PI * 0.3,
        color: { r: 255, g: 95, b: 31 },
        opacity: 0.6,
        lineWidth: 2,
        yOffset: 0
      },
      {
        // Secondary - thinner orange, different phase
        frequency: 0.009,
        amplitude: 35,
        speed: 0.022,
        phase: Math.PI * 1.2,
        color: { r: 255, g: 95, b: 31 },
        opacity: 0.3,
        lineWidth: 1,
        yOffset: 0
      },
      {
        // Blue accent - rare, subtle
        frequency: 0.012,
        amplitude: 25,
        speed: 0.018,
        phase: Math.PI * 0.7,
        color: { r: 43, g: 92, b: 255 },
        opacity: 0.2,
        lineWidth: 1,
        yOffset: 0
      }
    ]

    // Frequency bars
    const BAR_COUNT = 64
    const barValues = new Float32Array(BAR_COUNT)
    const barTargets = new Float32Array(BAR_COUNT)
    const barPhases = new Float32Array(BAR_COUNT)
    for (let i = 0; i < BAR_COUNT; i++) {
      barPhases[i] = Math.random() * Math.PI * 2
      barValues[i] = 0.1
      barTargets[i] = 0.1
    }

    function drawWave(wave, cw, ch) {
      const centerY = ch / 2 + wave.yOffset
      ctx.beginPath()

      for (let x = 0; x <= cw; x += 2) {
        const normalizedX = x / cw

        // Composite sine with harmonics
        let y = Math.sin(x * wave.frequency + time * wave.speed + wave.phase) * wave.amplitude
        y += Math.sin(x * wave.frequency * 1.5 + time * wave.speed * 0.7 + wave.phase * 1.3) * wave.amplitude * 0.3
        y += Math.sin(x * wave.frequency * 0.5 + time * wave.speed * 1.3 + wave.phase * 0.7) * wave.amplitude * 0.15

        // Envelope: fade at edges
        const envelope = Math.sin(normalizedX * Math.PI)
        y *= envelope

        if (x === 0) {
          ctx.moveTo(x, centerY + y)
        } else {
          ctx.lineTo(x, centerY + y)
        }
      }

      const { r, g, b } = wave.color
      ctx.strokeStyle = `rgba(${r},${g},${b},${wave.opacity})`
      ctx.lineWidth = wave.lineWidth
      ctx.stroke()

      // Draw glow for main wave
      if (wave.lineWidth >= 2) {
        ctx.beginPath()
        for (let x = 0; x <= cw; x += 2) {
          const normalizedX = x / cw
          let y = Math.sin(x * wave.frequency + time * wave.speed + wave.phase) * wave.amplitude
          y += Math.sin(x * wave.frequency * 1.5 + time * wave.speed * 0.7 + wave.phase * 1.3) * wave.amplitude * 0.3
          y += Math.sin(x * wave.frequency * 0.5 + time * wave.speed * 1.3 + wave.phase * 0.7) * wave.amplitude * 0.15
          const envelope = Math.sin(normalizedX * Math.PI)
          y *= envelope
          if (x === 0) ctx.moveTo(x, ch / 2 + y)
          else ctx.lineTo(x, ch / 2 + y)
        }
        ctx.strokeStyle = `rgba(${r},${g},${b},${wave.opacity * 0.15})`
        ctx.lineWidth = wave.lineWidth * 6
        ctx.stroke()
      }
    }

    function drawFrequencyBars(cw, ch) {
      const barAreaHeight = ch * 0.18
      const barAreaTop = ch * 0.22
      const barWidth = cw / BAR_COUNT
      const gap = 3

      for (let i = 0; i < BAR_COUNT; i++) {
        // Generate target from sine combination with randomness
        const newTarget = (
          Math.sin(time * 0.03 + barPhases[i]) * 0.3 +
          Math.sin(time * 0.05 + barPhases[i] * 1.7) * 0.2 +
          Math.sin(time * 0.08 + barPhases[i] * 2.3) * 0.15 +
          0.35 +
          (Math.random() - 0.5) * 0.08
        )
        barTargets[i] = Math.max(0.05, Math.min(1, newTarget))
        barValues[i] += (barTargets[i] - barValues[i]) * 0.08

        const barHeight = barValues[i] * barAreaHeight
        const x = i * barWidth + gap / 2
        const w = barWidth - gap

        // Bar
        ctx.fillStyle = `rgba(255,95,31,0.12)`
        ctx.fillRect(x, barAreaTop + barAreaHeight - barHeight, w, barHeight)

        // Top cap highlight
        ctx.fillStyle = `rgba(255,95,31,0.25)`
        ctx.fillRect(x, barAreaTop + barAreaHeight - barHeight, w, 1.5)
      }
    }

    // Bottom mirrored mini bars
    function drawBottomBars(cw, ch) {
      const barAreaHeight = ch * 0.08
      const barAreaBottom = ch * 0.78
      const barWidth = cw / BAR_COUNT
      const gap = 3

      for (let i = 0; i < BAR_COUNT; i++) {
        const barHeight = barValues[BAR_COUNT - 1 - i] * barAreaHeight * 0.5
        const x = i * barWidth + gap / 2
        const w = barWidth - gap

        ctx.fillStyle = `rgba(255,95,31,0.06)`
        ctx.fillRect(x, barAreaBottom, w, barHeight)
      }
    }

    // Center horizontal line
    function drawCenterLine(cw, ch) {
      const gradient = ctx.createLinearGradient(0, 0, cw, 0)
      gradient.addColorStop(0, 'rgba(42,39,36,0)')
      gradient.addColorStop(0.15, 'rgba(42,39,36,0.3)')
      gradient.addColorStop(0.5, 'rgba(42,39,36,0.3)')
      gradient.addColorStop(0.85, 'rgba(42,39,36,0.3)')
      gradient.addColorStop(1, 'rgba(42,39,36,0)')
      ctx.strokeStyle = gradient
      ctx.lineWidth = 0.5
      ctx.beginPath()
      ctx.moveTo(0, ch / 2)
      ctx.lineTo(cw, ch / 2)
      ctx.stroke()
    }

    // Side scale markers
    function drawScale(cw, ch) {
      const centerY = ch / 2
      ctx.fillStyle = 'rgba(58,54,48,0.4)'
      ctx.font = '9px "Space Mono", monospace'

      const marks = [-100, -50, 0, 50, 100]
      for (const m of marks) {
        const y = centerY - m
        // Left tick
        ctx.fillRect(20, y, 8, 0.5)
        // Right tick
        ctx.fillRect(cw - 28, y, 8, 0.5)
      }
    }

    // Animate frequency display
    let freqDisplay = 432
    let freqTarget = 432

    function animate() {
      const cw = window.innerWidth
      const ch = window.innerHeight

      time++

      // Clear
      ctx.fillStyle = '#141210'
      ctx.fillRect(0, 0, cw, ch)

      // Draw frequency bars (behind waves)
      drawFrequencyBars(cw, ch)
      drawBottomBars(cw, ch)

      // Center line
      drawCenterLine(cw, ch)

      // Draw scale markers
      drawScale(cw, ch)

      // Draw waves (back to front)
      drawWave(waves[0], cw, ch)
      drawWave(waves[3], cw, ch)
      drawWave(waves[2], cw, ch)
      drawWave(waves[1], cw, ch)

      // Ambient glow at center
      const glowGradient = ctx.createRadialGradient(
        cw / 2, ch / 2, 0,
        cw / 2, ch / 2, cw * 0.35
      )
      glowGradient.addColorStop(0, 'rgba(255,95,31,0.03)')
      glowGradient.addColorStop(0.5, 'rgba(255,95,31,0.01)')
      glowGradient.addColorStop(1, 'rgba(255,95,31,0)')
      ctx.fillStyle = glowGradient
      ctx.fillRect(0, 0, cw, ch)

      // Update frequency display
      if (time % 120 === 0) {
        const freqs = [432, 440, 528, 396, 417, 639, 741, 852]
        freqTarget = freqs[Math.floor(Math.random() * freqs.length)]
      }
      freqDisplay += (freqTarget - freqDisplay) * 0.05
      freqValueEl.textContent = Math.round(freqDisplay) + ' Hz'

      requestAnimationFrame(animate)
    }

    animate()
  </script>
</body>
</html>
