<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAG - Lightning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0e0d0b;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
    pointer-events: none;
  }

  .tag-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 120px;
    color: #f0ebe3;
    letter-spacing: 16px;
    text-transform: uppercase;
    line-height: 1;
    text-shadow:
      0 0 60px rgba(255, 95, 31, 0.1),
      0 0 120px rgba(255, 95, 31, 0.05);
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 13px;
    color: #5e5850;
    letter-spacing: 6px;
    text-transform: lowercase;
  }

  /* Flash overlay for lightning strikes */
  .flash {
    position: fixed;
    inset: 0;
    background: rgba(255, 95, 31, 0.03);
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.05s ease-out;
  }

  .flash.active {
    opacity: 1;
    transition: none;
  }
</style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="flash" id="flash"></div>

  <div class="overlay">
    <div class="tag-text">TAG</div>
    <div class="subtitle">raw energy</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const flash = document.getElementById('flash')

    let W, H
    const bolts = []
    const sparks = []
    let nextBoltTime = 0
    let nextSparkBatch = 0

    // Get the exclusion zone (the TAG text area) so lightning arcs near but not through it
    const getTextZone = () => {
      const tagEl = document.querySelector('.tag-text')
      if (!tagEl) return { x: W / 2, y: H / 2, hw: 200, hh: 80 }
      const rect = tagEl.getBoundingClientRect()
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2,
        hw: rect.width / 2 + 40,
        hh: rect.height / 2 + 30
      }
    }

    const resize = () => {
      W = canvas.width = window.innerWidth * devicePixelRatio
      H = canvas.height = window.innerHeight * devicePixelRatio
      canvas.style.width = window.innerWidth + 'px'
      canvas.style.height = window.innerHeight + 'px'
      ctx.scale(1, 1)
    }

    window.addEventListener('resize', resize)
    resize()

    // Midpoint displacement to generate a lightning path
    const generateBolt = (x1, y1, x2, y2, depth, maxDepth, segments) => {
      if (depth >= maxDepth) {
        segments.push({ x1, y1, x2, y2 })
        return
      }

      const midX = (x1 + x2) / 2
      const midY = (y1 + y2) / 2
      const dist = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2)
      const offset = (Math.random() - 0.5) * dist * 0.4

      // Perpendicular displacement
      const angle = Math.atan2(y2 - y1, x2 - x1)
      const nx = midX + Math.cos(angle + Math.PI / 2) * offset
      const ny = midY + Math.sin(angle + Math.PI / 2) * offset

      generateBolt(x1, y1, nx, ny, depth + 1, maxDepth, segments)
      generateBolt(nx, ny, x2, y2, depth + 1, maxDepth, segments)
    }

    const createBolt = () => {
      const dpr = devicePixelRatio
      const zone = getTextZone()

      // Start point near top
      const startX = (Math.random() * window.innerWidth) * dpr
      const startY = (Math.random() * window.innerHeight * 0.15) * dpr

      // End point near bottom
      const endX = (Math.random() * window.innerWidth) * dpr
      const endY = (window.innerHeight * 0.85 + Math.random() * window.innerHeight * 0.15) * dpr

      const segments = []
      const maxDepth = 6 + Math.floor(Math.random() * 3)
      generateBolt(startX, startY, endX, endY, 0, maxDepth, segments)

      // Generate 1-3 branches
      const branchCount = 1 + Math.floor(Math.random() * 3)
      const branches = []
      for (let b = 0; b < branchCount; b++) {
        const branchSegments = []
        // Pick a random segment to branch from
        const srcIdx = Math.floor(Math.random() * segments.length * 0.6)
        const src = segments[srcIdx]
        if (!src) continue

        const bEndX = src.x2 + (Math.random() - 0.5) * 400 * dpr
        const bEndY = src.y2 + Math.random() * 300 * dpr
        generateBolt(src.x1, src.y1, bEndX, bEndY, 0, 4 + Math.floor(Math.random() * 2), branchSegments)
        branches.push(branchSegments)
      }

      const bolt = {
        segments,
        branches,
        birth: performance.now(),
        lifetime: 250 + Math.random() * 150,
        width: 1.5 + Math.random() * 1.5
      }

      bolts.push(bolt)

      // Flash
      flash.classList.add('active')
      setTimeout(() => flash.classList.remove('active'), 60)
    }

    // Tiny static sparks
    const createSparkBatch = () => {
      const dpr = devicePixelRatio
      const count = 5 + Math.floor(Math.random() * 10)
      for (let i = 0; i < count; i++) {
        sparks.push({
          x: Math.random() * W,
          y: Math.random() * H,
          length: (2 + Math.random() * 4) * dpr,
          angle: Math.random() * Math.PI * 2,
          opacity: 0.05 + Math.random() * 0.15,
          birth: performance.now(),
          lifetime: 80 + Math.random() * 200
        })
      }
    }

    const drawSegments = (segments, alpha, width) => {
      ctx.beginPath()
      for (const seg of segments) {
        ctx.moveTo(seg.x1, seg.y1)
        ctx.lineTo(seg.x2, seg.y2)
      }
      ctx.strokeStyle = `rgba(255, 95, 31, ${alpha})`
      ctx.lineWidth = width
      ctx.shadowColor = '#ff5f1f'
      ctx.shadowBlur = 15 * devicePixelRatio
      ctx.stroke()

      // Bright core
      ctx.beginPath()
      for (const seg of segments) {
        ctx.moveTo(seg.x1, seg.y1)
        ctx.lineTo(seg.x2, seg.y2)
      }
      ctx.strokeStyle = `rgba(255, 230, 200, ${alpha * 0.6})`
      ctx.lineWidth = width * 0.4
      ctx.shadowBlur = 8 * devicePixelRatio
      ctx.shadowColor = 'rgba(255, 200, 150, 0.5)'
      ctx.stroke()

      ctx.shadowBlur = 0
    }

    const loop = (now) => {
      // Semi-transparent clear for fade trails
      ctx.fillStyle = 'rgba(14, 13, 11, 0.25)'
      ctx.fillRect(0, 0, W, H)

      // Schedule next bolt
      if (now >= nextBoltTime) {
        createBolt()
        nextBoltTime = now + 1000 + Math.random() * 2000
      }

      // Schedule spark batches
      if (now >= nextSparkBatch) {
        createSparkBatch()
        nextSparkBatch = now + 50 + Math.random() * 100
      }

      // Draw bolts
      for (let i = bolts.length - 1; i >= 0; i--) {
        const bolt = bolts[i]
        const age = now - bolt.birth
        if (age > bolt.lifetime) {
          bolts.splice(i, 1)
          continue
        }

        const progress = age / bolt.lifetime
        // Quick flash then fade
        let alpha
        if (progress < 0.1) {
          alpha = progress / 0.1
        } else {
          alpha = 1 - ((progress - 0.1) / 0.9)
        }
        alpha = Math.max(0, Math.min(1, alpha))

        drawSegments(bolt.segments, alpha, bolt.width * devicePixelRatio)

        // Draw branches dimmer
        for (const branch of bolt.branches) {
          drawSegments(branch, alpha * 0.5, bolt.width * 0.6 * devicePixelRatio)
        }
      }

      // Draw sparks
      ctx.shadowBlur = 0
      for (let i = sparks.length - 1; i >= 0; i--) {
        const spark = sparks[i]
        const age = now - spark.birth
        if (age > spark.lifetime) {
          sparks.splice(i, 1)
          continue
        }

        const fadeProgress = age / spark.lifetime
        const alpha = spark.opacity * (1 - fadeProgress)

        ctx.beginPath()
        ctx.moveTo(
          spark.x - Math.cos(spark.angle) * spark.length / 2,
          spark.y - Math.sin(spark.angle) * spark.length / 2
        )
        ctx.lineTo(
          spark.x + Math.cos(spark.angle) * spark.length / 2,
          spark.y + Math.sin(spark.angle) * spark.length / 2
        )
        ctx.strokeStyle = `rgba(255, 95, 31, ${alpha})`
        ctx.lineWidth = 1 * devicePixelRatio
        ctx.stroke()
      }

      requestAnimationFrame(loop)
    }

    // Initial clear
    ctx.fillStyle = '#0e0d0b'
    ctx.fillRect(0, 0, W, H)

    // Kick off first bolt quickly
    nextBoltTime = performance.now() + 500
    nextSparkBatch = performance.now()

    requestAnimationFrame(loop)
  </script>
</body>
</html>
