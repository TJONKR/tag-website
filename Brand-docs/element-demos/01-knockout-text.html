<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knockout Text - TAG Brand Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #141210;
      color: #f0ebe3;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .label {
      position: fixed;
      top: 24px;
      left: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      color: #5e5850;
      letter-spacing: 0.08em;
      z-index: 10;
    }

    .demo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }

    .knockout-wrapper {
      position: relative;
      display: inline-block;
    }

    .knockout-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 30vw;
      line-height: 0.9;
      letter-spacing: -0.02em;
      background: linear-gradient(
        135deg,
        #ff5f1f 0%,
        #ff8c42 15%,
        #ff5f1f 30%,
        #c43e00 50%,
        #ff5f1f 65%,
        #ff8c42 80%,
        #ff5f1f 100%
      );
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientShift 8s ease-in-out infinite;
      user-select: none;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 0%;
      }
      25% {
        background-position: 100% 50%;
      }
      50% {
        background-position: 50% 100%;
      }
      75% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 0% 0%;
      }
    }

    .knockout-sub {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: #5e5850;
      text-transform: lowercase;
      letter-spacing: 0.04em;
      margin-top: 32px;
      text-align: center;
    }

    /* Subtle ambient glow behind the text */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw;
      height: 30vw;
      background: radial-gradient(ellipse, rgba(255, 95, 31, 0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: glowPulse 8s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="label">01 / knockout text &mdash; background-clip: text</div>

  <div class="demo-container">
    <div class="glow"></div>
    <div class="knockout-wrapper">
      <div class="knockout-text">TAG</div>
    </div>
    <div class="knockout-sub">text revealing image or video behind it</div>
  </div>
</body>
</html>
