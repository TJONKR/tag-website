<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>08 — Scanlines / CRT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141210;
      color: #f0ebe3;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .label {
      position: fixed;
      top: 20px;
      left: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      color: #5e5850;
      letter-spacing: 0.1em;
      z-index: 200;
    }

    /* Scanline overlay covering entire viewport */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 1px,
        rgba(0,0,0,0.3) 1px,
        rgba(0,0,0,0.3) 2px
      );
      pointer-events: none;
      z-index: 100;
      animation: flicker 0.15s infinite alternate;
    }

    @keyframes flicker {
      0%   { opacity: 0.97; }
      50%  { opacity: 1.0; }
      100% { opacity: 0.98; }
    }

    /* Hero section with TAG */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 65vh;
      position: relative;
    }

    .hero-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20vw;
      color: #f0ebe3;
      letter-spacing: -0.02em;
      user-select: none;
      text-shadow:
        0 0 40px rgba(255,95,31,0.3),
        0 0 80px rgba(255,95,31,0.15),
        0 0 120px rgba(255,95,31,0.08);
    }

    /* Subtle vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 50%,
        rgba(0,0,0,0.4) 100%
      );
      pointer-events: none;
      z-index: 50;
    }

    /* Terminal section */
    .terminal-section {
      padding: 0 40px 80px;
      max-width: 720px;
      margin: 0 auto;
    }

    .terminal {
      background: rgba(20,18,16,0.9);
      border: 1px solid #2a2520;
      border-radius: 6px;
      overflow: hidden;
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(42,37,32,0.6);
      border-bottom: 1px solid #2a2520;
    }

    .terminal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #5e5850;
    }

    .terminal-dot.red { background: #ff5f5f; }
    .terminal-dot.yellow { background: #ffbf3f; }
    .terminal-dot.green { background: #5fdf5f; }

    .terminal-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #5e5850;
      margin-left: 8px;
    }

    .terminal-body {
      padding: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      line-height: 1.8;
    }

    .terminal-line {
      white-space: pre;
      display: block;
    }

    .prompt {
      color: #ff5f1f;
    }

    .command {
      color: #f0ebe3;
    }

    .progress {
      color: #5e5850;
    }

    .success {
      color: #5fdf5f;
    }

    .info {
      color: #5e5850;
    }

    .highlight {
      color: #ff5f1f;
    }

    /* Cursor blink */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: #ff5f1f;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* Divider between sections */
    .section-divider {
      width: 100%;
      height: 1px;
      background: #2a2520;
      margin: 0;
    }

    /* Subtle phosphor glow on terminal text */
    .terminal-body {
      text-shadow: 0 0 4px rgba(255,95,31,0.15);
    }
  </style>
</head>
<body>

  <div class="label">08 / crt scanlines</div>

  <!-- Scanline overlay -->
  <div class="scanlines"></div>

  <!-- Vignette overlay -->
  <div class="vignette"></div>

  <!-- Hero: TAG with glow -->
  <div class="hero">
    <span class="hero-text">TAG</span>
  </div>

  <div class="section-divider"></div>

  <!-- Terminal output -->
  <div class="terminal-section" style="padding-top: 60px;">
    <div class="terminal">
      <div class="terminal-bar">
        <div class="terminal-dot red"></div>
        <div class="terminal-dot yellow"></div>
        <div class="terminal-dot green"></div>
        <span class="terminal-title">tag-cli ~ build</span>
      </div>
      <div class="terminal-body">
        <span class="terminal-line"><span class="prompt">$ </span><span class="command">tag build --deploy</span></span>
        <span class="terminal-line"><span class="info">&nbsp;</span></span>
        <span class="terminal-line"><span class="progress">[</span><span class="highlight">&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;</span><span class="progress">&#9617;&#9617;&#9617;&#9617;&#9617;&#9617;&#9617;] 67% compiling...</span></span>
        <span class="terminal-line"><span class="info">&nbsp;</span></span>
        <span class="terminal-line"><span class="success">&#10003;</span><span class="info"> 427 modules transformed</span></span>
        <span class="terminal-line"><span class="success">&#10003;</span><span class="info"> deployed to </span><span class="highlight">tag.amsterdam</span></span>
        <span class="terminal-line"><span class="info">&nbsp;</span></span>
        <span class="terminal-line"><span class="prompt">$ </span><span class="cursor"></span></span>
      </div>
    </div>
  </div>

</body>
</html>
