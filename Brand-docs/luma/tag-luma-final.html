<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TAG — Luma Final Export</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #888; padding: 40px; font-family: monospace; }
    .label { font-size: 12px; color: #ccc; margin: 12px 0 40px; }
    h2 { font-size: 11px; color: #ddd; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 60px; }
    h2:first-of-type { margin-top: 0; }
  </style>
</head>
<body>

  <h2>Logo — 400x400 (screenshot dit blok)</h2>
  <div style="width: 400px; height: 400px; background: #141210; position: relative; overflow: hidden;">
    <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 100px; color: #f0ebe3; letter-spacing: -0.03em;">TAG</div>
  </div>
  <div class="label">Wit op zwart, Syne 800</div>

  <h2>Header — 1750x500 (3.5:1 ratio voor Luma)</h2>
  <div style="width: 1750px; height: 500px; position: relative; overflow: hidden; background: #141210;">
    <div style="position: absolute; inset: 0; background: radial-gradient(ellipse at 65% 30%, #ff5f1f 0%, #e04a10 15%, #8a2e08 40%, #141210 70%);"></div>
    <div style="position: absolute; inset: 0; background: radial-gradient(circle, transparent 35%, #141210 36%) 0 0 / 6px 6px; opacity: 0.55;"></div>
    <svg style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;" xmlns="http://www.w3.org/2000/svg">
      <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/></filter>
      <rect width="100%" height="100%" filter="url(#g)" opacity="0.04"/>
    </svg>
    <div style="position: absolute; bottom: 32px; right: 40px; font-family: 'Space Mono', monospace; font-size: 14px; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(240,235,227,0.5); z-index: 10;">To Achieve Greatness</div>
  </div>
  <div class="label">Halftone gradient 135deg + "To Achieve Greatness" rechtsonder</div>

</body>
</html>
